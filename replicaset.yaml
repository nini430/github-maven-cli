apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replicaset
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
      env: production
  template:
    metadata:
      labels:
        app: nginx
        env: production
    spec:
      containers:
        - name: nginx
          image: httpd:latest
          ports:
            - containerPort: 80
